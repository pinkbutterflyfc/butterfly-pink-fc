<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: pink;
    }

    .container {
      position: relative;
    }

    img {
      width: 80%;
      margin-top:17px;
    }

    .menu {
      position: absolute;
      top: 400px;   /* 👈 AJUSTA A ALTURA AQUI */
      left: 25%;
      transform: translateX(-50%);
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 15px 25px;
      background:#ef0064;
      color: black;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;

      /* ANIMAÇÃO PULSAR */
      animation: pulsar 1.5s infinite;
    }

    @keyframes pulsar {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .btn:hover {
      transform: scale(1.1);
    }

  </style>
</head>

<body>

<div class="container">

  <img src="1.png" alt="1">

  <div class="menu">
    <a href="about.html" class="btn">About</a>
    <a href="titles.html" class="btn">Titles</a>
    <a href="players.html" class="btn">Players</a>
    <a href="opinion.html" class="btn">Opinion</a>
  </div>

</div>

</body>
</html>
