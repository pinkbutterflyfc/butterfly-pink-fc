<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Home</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ef0064;
            font-family: Arial;
        }

        .container {
            position: relative;
            width: 300px;
            margin: 60px auto;
        }

        .card {
            width: 100%;
            border-radius: 15px;
        }

        .botoes {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- IMAGEM PRINCIPAL -->
        <img src="tainarahome01.png" class="card">

        <!-- BOTÕES -->
        <div class="botoes">
            <button onclick="location.href='about'">Botão 1</button>
            <button onclick="location.href='title'">Botão 2</button>
            <button onclick="location.href='players'">Botão 3</button>
        </div>

    </div>

</body>
</html>
