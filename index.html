<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: pink;
    }

    img {
      width: 80%;
      margin-top:17px;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 15px 25px;
      background: black;
      color: pink;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;

      /* ANIMAÇÃO */
      opacity: 0;
      transform: translateY(20px);
      animation: pulsar 1s infinite;
    }

    /* ANIMAÇÃO */
    @keyframes aparecer {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* APARECER UM POR UM */
    .btn:nth-of-type(1) { animation-delay: 0.2s; }
    .btn:nth-of-type(2) { animation-delay: 0.4s; }
    .btn:nth-of-type(3) { animation-delay: 0.6s; }
    .btn:nth-of-type(4) { animation-delay: 0.8s; }

    /* EFEITO HOVER */
    .btn:hover {
      transform: scale(1.1);
    }

  </style>
</head>

<body>

<img src="1.png" alt="1">

<br>

<a href="about.html" class="btn">About</a>
<a href="titles.html" class="btn">Titles</a>
<a href="players.html" class="btn">Players</a>
<a href="opinion.html" class="btn">Opinion</a>

</body>
</html>
